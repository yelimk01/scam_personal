                    fontFamily: { serif: ['"Nanum Myeongjo"', 'serif'], sans: ['"Inter"', 'sans-serif'] }

    <nav class="fixed top-0 left-0 w-full z-50 bg-soft-sand/90 backdrop-blur-md border-b border-sage-light">

            <a href="index.html" class="font-serif text-base sm:text-lg font-bold tracking-wider text-sage-dark flex items-center gap-2">

            <a href="off-life.html">OFF: 인간 예림</a>
            <a href="chuchu.html">with 츄츄</a>
            <a href="contact.html" class="text-sage-herb font-bold">기록장 닫으며</a>
        </div>

    <section class="relative z-10 py-12 sm:py-20 px-4 sm:px-6 max-w-4xl mx-auto text-center">
        <span class="text-xs uppercase tracking-widest text-sage-dark font-semibold mb-2 block">05 / 기록장을 닫으며</span>
        <h2 class="font-serif text-2xl sm:text-3xl md:text-4xl font-extrabold text-soft-black mb-4">함께 따뜻한 기록을 이어나가 볼까요?</h2>
        <p class="text-xs sm:text-sm text-gray-500 max-w-lg mx-auto mb-12">주변을 돌보고 삶의 균형을 아는 지혜로운 동료를 찾고 계시다면 편하게 인사를 건네주세요.</p>

        <div class="bg-white p-6 sm:p-8 rounded-3xl border border-sage-light shadow-xl text-left max-w-xl mx-auto">
            <form id="contact-form" class="space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-sage-dark uppercase mb-2">당신의 이름 또는 팀</label>
                        <input type="text" id="contact-name" placeholder="방문자명" class="w-full bg-soft-sand px-4 py-3 rounded-xl border border-sage-light text-sm focus:outline-none" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-sage-dark uppercase mb-2">이메일 주소</label>
                        <input type="email" id="contact-email" placeholder="example@company.com" class="w-full bg-soft-sand px-4 py-3 rounded-xl border border-sage-light text-sm focus:outline-none" required>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-sage-dark uppercase mb-2">예림에게 남길 메시지</label>
                    <textarea id="contact-message" rows="4" placeholder="따뜻한 한 줄 안부를 적어주세요." class="w-full bg-soft-sand px-4 py-3 rounded-xl border border-sage-light text-sm focus:outline-none" required></textarea>
                </div>
                <button type="submit" class="w-full bg-sage-herb text-white font-bold py-4 rounded-xl text-sm hover:bg-sage-dark transition-colors flex justify-center items-center gap-2">
                    <i class="fa-regular fa-paper-plane"></i> 방명록 남기기
                </button>
            </form>
            
            <div id="form-success-box" class="hidden mt-6 bg-sage-light border border-sage-herb/30 p-4 rounded-xl flex items-center gap-3 text-sage-dark">
                <i class="fa-
